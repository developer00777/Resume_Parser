name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Lint & Type Check ────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff
        run: ruff check app/ tests/ --ignore E501

  # ── Unit & Integration Tests (no live Ollama / Salesforce) ──────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      # Dummy values — real services are mocked in tests
      OLLAMA_HOST: http://localhost:11434
      OLLAMA_MODEL: qwen2.5:3b
      API_KEY: testkey-ci
      SF_CLIENT_ID: dummy_client_id
      SF_CLIENT_SECRET: dummy_client_secret
      SF_LOGIN_URL: https://login.salesforce.com
      SF_API_VERSION: "59.0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest tests/test_api.py -v \
            --tb=short \
            --junitxml=test-results/results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  # ── Docker build (verify image builds correctly) ────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: resume-parser:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Optional: Push to Docker Hub on main branch ────────────────────────────
  # Uncomment and set DOCKERHUB_USERNAME + DOCKERHUB_TOKEN secrets to enable.
